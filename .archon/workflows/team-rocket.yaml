# team-rocket: plan with citations, build in grapes, prove it works.
# Roles: meowth plans, james builds, jessie proves. Beads holds every decision.
name: team-rocket
description: |
  Use when: a story needs the team-rocket treatment - a cited plan, grape-sized
  implementation, and production-confidence verification.
  Input: a story id (beads or external tracker) or a story description.
  Output: a verified MR/PR and a beads trail of every decision.

nodes:
  - id: ideate
    command: team-rocket-ideate
    model: large
    context: fresh

  - id: plan
    command: team-rocket-plan
    depends_on: [ideate]
    model: large
    interactive: true
    context: fresh

  - id: implement
    depends_on: [plan]
    model: medium
    loop:
      prompt: |
        Follow .archon/commands/team-rocket-implement.md for one task.
        Reply ALL_TASKS_COMPLETE when the story has no open tasks left.
      until: ALL_TASKS_COMPLETE
      max_iterations: 25
      fresh_context: true

  - id: verify
    command: team-rocket-verify
    depends_on: [implement]
    model: large
    context: fresh

  - id: fix
    command: team-rocket-fix
    depends_on: [verify]
    model: medium
    context: fresh

  - id: confirm
    command: team-rocket-confirm
    depends_on: [fix]
    model: large
    context: fresh

  - id: pr
    command: team-rocket-pr
    depends_on: [confirm]
    model: small
    context: fresh

  - id: retro
    command: team-rocket-retro
    depends_on: [pr]
    model: small
    context: fresh
