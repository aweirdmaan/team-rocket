# SPIKE variant of team-rocket for ada-83r.1: mechanics test, no interactive gates.
# Deltas from team-rocket.yaml: gates removed (story is pre-authorized in the run
# message), validate node is real, per-node models exercise the tier system.
name: team-rocket-spike
description: Unattended spike run — plan → implement → validate → review on a pre-authorized grape-sized story.

nodes:
  - id: plan
    model: large
    prompt: |
      Plan the story given in the run message. It is pre-authorized: do not pause
      for human confirmation. Read the code the story touches. Write the plan to
      PLAN.md at the repo root: goal, files to change, exact changes, test cases,
      how to verify. Keep it short and concrete. No code changes in this node.

  - id: implement
    depends_on: [plan]
    loop:
      prompt: |
        Read PLAN.md. Implement the next unchecked task. Follow the plan exactly;
        if the code contradicts the plan, stop and say so instead of improvising.
        One logical change per commit, keep each commit small. Tick the task off
        in PLAN.md when done. Reply ALL_TASKS_COMPLETE when every task is ticked.
      until: ALL_TASKS_COMPLETE
      max_iterations: 5
      fresh_context: true
    model: medium

  - id: validate
    depends_on: [implement]
    bash: "make validate"

  - id: review
    depends_on: [validate]
    model: large
    prompt: |
      Review the diff against PLAN.md. Run `make validate` yourself and confirm it
      passes. Try to break the change: feed it a malformed input if it takes one.
      Confirm nothing that worked before is broken. Fix small issues directly;
      report anything structural. End with a one-paragraph verdict.
