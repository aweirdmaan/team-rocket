# team-rocket — the team-rocket process expressed as an Archon harness workflow.
#
# Archon (the workflow engine on coleam00/Archon main) owns the deterministic control
# flow: the node DAG, the implementation loop, the human gate, and branch/worktree
# isolation. team-rocket owns the *behaviour* at each node — the roles, the relentless
# plan interrogation, and the quality bar. One orchestrator (Archon); team-rocket as
# the taste.
#
# Install: copy this file into your project's `.archon/workflows/`. A same-named file in
# your repo overrides the bundled default. Then, in Claude Code: "Use archon to run the
# team-rocket workflow on <task>."
#
# NOTE: the node schema below follows Archon's documented shape (prompt / bash /
# loop+until+fresh_context / depends_on / interactive). Verify the keys against YOUR
# Archon version and adjust — this is a template, not a guaranteed-valid file. Fill in the
# `validate` node's bash with your project's real test/lint command.

name: team-rocket
description: The full team-rocket lifecycle — discovery → planning huddle (interrogate the lead until the problem is shared) → TDD implementation → validate → review → land (Definition of Done + PR) → retro. Quality is the goal; the steps are means.

nodes:
  - id: discovery
    prompt: |
      Discovery — no code. Understand the problem space and the code before any goals:
      read the relevant code and subsystems, map dependencies and integration points,
      identify constraints and risks, and map any acceptance rows to an existing or new
      test. Output: problem space and code understood, constraints/risks documented,
      goal candidates drafted. This is homework on the code — the next node aligns the
      problem with the human.

  - id: plan
    depends_on: [discovery]
    interactive: true          # human gate: this node questions the lead and waits for written answers
    prompt: |
      Planning huddle. PRIME DIRECTIVE: do not propose a solution until you and the lead
      share one mental model of the problem.

      PHASE 1 — interrogate the lead relentlessly, in text, from three lenses:
        • the problem & why — who it's for, what success looks like, the history;
        • concrete behaviour — inputs, outputs, edge cases, scope, constraints;
        • done & verifiable — each outcome as a testable statement; contradictions.
      Reject vague answers ("make it fast" → "p95 under what load?"; "handle errors" →
      "which errors, and the exact behaviour for each?"). Never assume or infer an answer
      the lead didn't give; re-ask. Drill until each answer is concrete enough to test.
      End by writing back a problem statement (problem, why, who for, success,
      out-of-scope, constraints, edges) and getting the lead's WRITTEN confirmation.
      No confirmation → do not proceed to design.

      PHASE 2 — interrogate the design: buildable without a workaround? right-sized (no
      single requirement forcing multi-file/multi-layer change)? testable (name a
      regression a test would catch per acceptance row)? no speculative abstraction or
      dispatch tag? Lock the goals (WHY + WHAT); keep the HOW negotiable. Output a plan
      that meets the Definition of Ready.

  - id: implement
    depends_on: [plan]
    loop:
      prompt: |
        Read the plan. Implement the next task to amazing-code quality — correct, simple,
        honest, right-sized, maintainable. Tests and code together: behaviour pinned by
        tests strong enough to fail on a real regression (TDD by default — the result is
        graded, not the order it was typed). Atomic commits. Run validation. Where the
        change is observable at runtime, run it and confirm the behaviour, not just the
        tests.
      until: ALL_TASKS_COMPLETE
      fresh_context: true

  - id: validate
    depends_on: [implement]
    bash: "echo 'TODO: replace with your test/lint command, e.g. bun run validate | make test | pytest -q'"

  - id: review
    depends_on: [validate]
    prompt: |
      Review all changes against the plan and the quality bar, the way Jessie would —
      judge the diff, not the ceremony. Verify each acceptance row is actually met and the
      behaviour was run, not just asserted. Flag named failure modes (dispatch tags,
      speculative generality, defensive guards for impossible cases, weak assertions,
      vocabulary misuse). Confirm the suite fails on a plausible regression. Fix what you
      find; if a finding is really a design problem, surface it rather than papering over it.

  - id: land
    depends_on: [review]
    prompt: |
      Land the story — verify the Definition of Done before it closes. Done is shown, not
      asserted: for each locked acceptance row, point to the test that pins it AND the
      runtime evidence (you ran it, you saw the behaviour). Confirm all gates are green and
      there's no environment / build / toolchain drift. Do a light security pass — leaked
      secret, injection path, broken authz, risky new dependency. If any acceptance row
      can't be demonstrated, it is NOT done: stop and route back to implementation rather
      than closing it. When all rows are demonstrated, open the PR — title with the story
      id; body states the WHY, the acceptance met, and the verification evidence.

  - id: retro
    depends_on: [land]
    interactive: true          # the TEAM-ROCKET.md delta needs the lead's approval
    prompt: |
      Retro — close the learning loop. Hold the outcome against the plan's
      Definition-of-Ready predictions: was it buildable without a workaround? was the scope
      right-sized? were the acceptance rows as testable as predicted? did we hit a wall a
      prior failed approach should have flagged? Name where the plan was wrong — that's the
      lesson. Then draft the TEAM-ROCKET.md delta (new vocabulary, a pattern-hierarchy
      update, a failure-modes exception, a test-convention note) for the lead to approve and
      write, and file a plugin-update proposal if a smell recurred. Keep it tight; for a
      trivial story, "plan held; nothing new" is a complete retro.
